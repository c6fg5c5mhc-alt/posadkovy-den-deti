name: Fix UH-60 PNG transparency

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-png:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pillow
        run: python -m pip install --upgrade pillow
      - name: Remove black background from UH-60 PNG
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          p = Path('uh60m.png')
          if not p.exists():
              raise SystemExit('uh60m.png not found')
          img = Image.open(p).convert('RGBA')
          out = []
          for r, g, b, a in img.getdata():
              # remove pure/near black rectangular background, keep visible helicopter parts
              if r < 28 and g < 28 and b < 28:
                  out.append((r, g, b, 0))
              else:
                  out.append((r, g, b, a))
          img.putdata(out)
          img.save(p)
          print('Updated', p)
          PY
      - name: Ensure CSS does not draw a box around the helicopter
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('mix-blend-mode:screen;', 'mix-blend-mode:normal;')
          s = s.replace('filter:brightness(1.1) drop-shadow(0 0 10px rgba(184,161,100,.3));', 'filter:drop-shadow(0 0 14px rgba(184,161,100,.4)) brightness(1.12) contrast(1.05);background:transparent!important;border:0!important;outline:0!important;box-shadow:none!important;')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit fixed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uh60m.png index.html
          git diff --cached --quiet && echo "No changes" || git commit -m "Fix UH-60 PNG transparency"
          git push
